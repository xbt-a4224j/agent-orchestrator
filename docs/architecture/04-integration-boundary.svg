<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="'Courier New', Courier, monospace">
  <rect width="800" height="480" fill="#ffffff"/>
  <text x="400" y="32" font-size="15" font-weight="bold" fill="#111" text-anchor="middle">Integration Boundary (mocked vs real)</text>

  <!-- System boundary -->
  <rect x="20" y="55" width="560" height="390" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="2"/>
  <text x="300" y="76" font-size="11" fill="#6B7280" text-anchor="middle" font-style="italic">this repo</text>

  <!-- Engine box -->
  <rect x="60" y="90" width="220" height="320" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="170" y="112" font-size="11" fill="#15803D" font-weight="bold" text-anchor="middle">packages/engine</text>

  <rect x="80" y="125" width="180" height="30" rx="3" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="170" y="145" font-size="10.5" fill="#15803D" text-anchor="middle">orchestrator.ts</text>

  <rect x="80" y="165" width="180" height="30" rx="3" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="170" y="185" font-size="10.5" fill="#15803D" text-anchor="middle">specialists/</text>

  <rect x="80" y="205" width="180" height="30" rx="3" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="170" y="225" font-size="10.5" fill="#15803D" text-anchor="middle">llm.ts (ILLMClient)</text>

  <rect x="80" y="245" width="180" height="30" rx="3" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="170" y="265" font-size="10.5" fill="#15803D" text-anchor="middle">replay.ts</text>

  <rect x="80" y="285" width="180" height="30" rx="3" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="170" y="305" font-size="10.5" fill="#15803D" text-anchor="middle">hubspot.mock.ts</text>

  <rect x="80" y="325" width="180" height="30" rx="3" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="170" y="345" font-size="10.5" fill="#15803D" text-anchor="middle">resend.mock.ts</text>

  <rect x="80" y="365" width="180" height="30" rx="3" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="170" y="385" font-size="10.5" fill="#15803D" text-anchor="middle">engagement.mock.ts</text>

  <!-- API box -->
  <rect x="310" y="90" width="240" height="320" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="430" y="112" font-size="11" fill="#1D4ED8" font-weight="bold" text-anchor="middle">apps/web/api</text>

  <rect x="330" y="125" width="200" height="30" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="430" y="145" font-size="10.5" fill="#1D4ED8" text-anchor="middle">POST /api/runs</text>

  <rect x="330" y="165" width="200" height="30" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="430" y="185" font-size="10.5" fill="#1D4ED8" text-anchor="middle">GET /api/runs/:id</text>

  <rect x="330" y="205" width="200" height="30" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="430" y="225" font-size="10.5" fill="#1D4ED8" text-anchor="middle">GET /api/runs/:id/stream</text>

  <rect x="330" y="245" width="200" height="30" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="430" y="265" font-size="10.5" fill="#1D4ED8" text-anchor="middle">POST /:id/replay</text>

  <rect x="330" y="285" width="200" height="30" rx="3" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="430" y="305" font-size="10.5" fill="#1D4ED8" text-anchor="middle">POST /webhooks/engagement</text>

  <!-- External services (right side) -->
  <!-- Anthropic (REAL) -->
  <rect x="610" y="90" width="170" height="55" rx="5" fill="#F3E8FF" stroke="#C084FC" stroke-width="2"/>
  <text x="695" y="113" font-size="11" fill="#7E22CE" font-weight="bold" text-anchor="middle">Anthropic API</text>
  <text x="695" y="133" font-size="9.5" fill="#7E22CE" text-anchor="middle">REAL (live LLM calls)</text>

  <!-- HubSpot (MOCKED) -->
  <rect x="610" y="165" width="170" height="55" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="695" y="188" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">HubSpot API</text>
  <text x="695" y="208" font-size="9.5" fill="#B45309" text-anchor="middle">MOCKED (in-process)</text>

  <!-- Resend (MOCKED) -->
  <rect x="610" y="240" width="170" height="55" rx="5" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="695" y="263" font-size="11" fill="#92400E" font-weight="bold" text-anchor="middle">Resend API</text>
  <text x="695" y="283" font-size="9.5" fill="#B45309" text-anchor="middle">MOCKED (in-process)</text>

  <!-- Postgres (REAL) -->
  <rect x="610" y="315" width="170" height="55" rx="5" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="695" y="338" font-size="11" fill="#15803D" font-weight="bold" text-anchor="middle">Postgres / Neon</text>
  <text x="695" y="358" font-size="9.5" fill="#15803D" text-anchor="middle">REAL (raw SQL)</text>

  <!-- Arrows: engine → external -->
  <line x1="260" y1="210" x2="608" y2="118" stroke="#C084FC" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="430" y="148" font-size="9" fill="#7E22CE" text-anchor="middle">ILLMClient.call()</text>

  <line x1="260" y1="300" x2="608" y2="192" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="460" y="240" font-size="9" fill="#B45309">pushCampaign()</text>

  <line x1="260" y1="340" x2="608" y2="268" stroke="#FCD34D" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="460" y="300" font-size="9" fill="#B45309">sendBatch()</text>

  <line x1="430" y1="410" x2="695" y2="370" stroke="#86EFAC" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="580" y="410" font-size="9" fill="#15803D">SQL via postgres driver</text>

  <!-- Legend -->
  <line x1="40" y1="455" x2="70" y2="455" stroke="#C084FC" stroke-width="2"/>
  <text x="78" y="459" font-size="9.5" fill="#6B7280">real network call</text>
  <line x1="175" y1="455" x2="205" y2="455" stroke="#FCD34D" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="213" y="459" font-size="9.5" fill="#6B7280">mocked in-process</text>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>
