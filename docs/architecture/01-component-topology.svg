<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" font-family="'Courier New', Courier, monospace">
  <rect width="900" height="540" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="36" font-size="15" font-weight="bold" fill="#111" text-anchor="middle">Component Topology</text>

  <!-- apps/web layer -->
  <rect x="30" y="60" width="840" height="130" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="50" y="82" font-size="11" fill="#3B82F6" font-weight="bold">apps/web</text>

  <rect x="60" y="94" width="140" height="40" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="130" y="119" font-size="11" fill="#1D4ED8" text-anchor="middle">BriefForm</text>

  <rect x="220" y="94" width="140" height="40" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="290" y="119" font-size="11" fill="#1D4ED8" text-anchor="middle">RunTree + EventLog</text>

  <rect x="380" y="94" width="140" height="40" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="450" y="119" font-size="11" fill="#1D4ED8" text-anchor="middle">PacketView</text>

  <rect x="540" y="94" width="140" height="40" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="610" y="119" font-size="11" fill="#1D4ED8" text-anchor="middle">HistoryRail</text>

  <rect x="700" y="94" width="150" height="40" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="775" y="113" font-size="11" fill="#1D4ED8" text-anchor="middle">POST /api/runs</text>
  <text x="775" y="128" font-size="11" fill="#1D4ED8" text-anchor="middle">GET /stream (SSE)</text>

  <text x="450" y="180" font-size="10" fill="#6B7280" text-anchor="middle">Next.js 15 App Router · Tailwind 3 · React 18</text>

  <!-- Arrow down -->
  <line x1="775" y1="200" x2="775" y2="230" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- packages/engine layer -->
  <rect x="30" y="230" width="560" height="200" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="50" y="252" font-size="11" fill="#16A34A" font-weight="bold">packages/engine</text>

  <!-- Orchestrator -->
  <rect x="60" y="265" width="150" height="40" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="135" y="290" font-size="11" fill="#15803D" text-anchor="middle">orchestrator.ts</text>

  <!-- Planner -->
  <rect x="230" y="265" width="120" height="40" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="290" y="290" font-size="11" fill="#15803D" text-anchor="middle">planner.ts</text>

  <!-- Specialists -->
  <rect x="60" y="325" width="120" height="36" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="120" y="348" font-size="11" fill="#15803D" text-anchor="middle">specialists/</text>

  <!-- Replay -->
  <rect x="200" y="325" width="110" height="36" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="255" y="348" font-size="11" fill="#15803D" text-anchor="middle">replay.ts</text>

  <!-- Cost -->
  <rect x="330" y="325" width="100" height="36" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="380" y="348" font-size="11" fill="#15803D" text-anchor="middle">cost.ts</text>

  <!-- LLM -->
  <rect x="450" y="325" width="110" height="36" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="505" y="348" font-size="11" fill="#15803D" text-anchor="middle">llm.ts</text>

  <!-- Packet -->
  <rect x="60" y="380" width="110" height="36" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="115" y="403" font-size="11" fill="#15803D" text-anchor="middle">packet.ts</text>

  <!-- Log -->
  <rect x="190" y="380" width="90" height="36" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="235" y="403" font-size="11" fill="#15803D" text-anchor="middle">log.ts</text>

  <!-- Integrations -->
  <rect x="300" y="380" width="130" height="36" rx="4" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <text x="365" y="398" font-size="11" fill="#15803D" text-anchor="middle">integrations/</text>
  <text x="365" y="411" font-size="10" fill="#6B7280" text-anchor="middle">(HubSpot · Resend · webhook)</text>

  <!-- packages/db layer -->
  <rect x="610" y="230" width="260" height="200" rx="6" fill="#FFF7ED" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="630" y="252" font-size="11" fill="#D97706" font-weight="bold">packages/db</text>

  <rect x="640" y="265" width="200" height="40" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="740" y="290" font-size="11" fill="#92400E" text-anchor="middle">client.ts (query helpers)</text>

  <rect x="640" y="320" width="200" height="40" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="740" y="345" font-size="11" fill="#92400E" text-anchor="middle">migrations/ (.sql)</text>

  <!-- Postgres -->
  <rect x="640" y="375" width="200" height="40" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1"/>
  <text x="740" y="400" font-size="11" fill="#92400E" text-anchor="middle">Postgres 16 (Neon)</text>

  <!-- Arrow engine → db -->
  <line x1="592" y1="360" x2="638" y2="360" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow engine → Anthropic -->
  <line x1="310" y1="460" x2="310" y2="510" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- External: Anthropic -->
  <rect x="170" y="470" width="280" height="38" rx="4" fill="#F3E8FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="310" y="494" font-size="11" fill="#7E22CE" text-anchor="middle">Anthropic API (claude-sonnet-4-6)</text>

  <!-- Arrow web → engine -->
  <line x1="600" y1="300" x2="592" y2="300" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="265" x2="600" y2="340" stroke="#9CA3AF" stroke-width="1.5"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>
